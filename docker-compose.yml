services:
  mail-forwarder:
    image: ghcr.io/yunyingk/mail-forwarder:v0.2.2
    container_name: mail-forwarder
    restart: always
    volumes:
      - ./config.yaml:/etc/mail-forwarder/config.yaml:ro
      # Set state.path to /var/lib/mail-forwarder/state.json in config.yaml.
      - ./data:/var/lib/mail-forwarder
