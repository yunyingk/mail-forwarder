# mail-forwarder config example
# Copy to config.yaml and fill in real credentials.

imap:
  - name: hesi-mailbox
    host: imap.exmail.qq.com
    port: 993
    secure: true
    user: alert@example.com
    pass: your_imap_password
    mailbox: INBOX
    webhook:
      url: https://example.com/mail-ingress
      secret: your_webhook_secret
      timeout_sec: 10
      headers:
        X-Agent-Name: mail-forwarder
    payload:
      include_raw_rfc822: false
      attachments: disabled # disabled, metadata, inline_base64
    idle_fallback:
      allow: false
      interval_sec: 60
    timeouts:
      connection_sec: 15
      socket_sec: 300

  # - name: another-mailbox
  #   host: imap.feishu.cn
  #   port: 993
  #   secure: true
  #   user: alert2@example.com
  #   pass: your_password_2
  #   mailbox: INBOX
  #   webhook:
  #     url: http://127.0.0.1:3000/mail-hook
  #     timeout_sec: 10

dry_run: false
poll_on_start: true
